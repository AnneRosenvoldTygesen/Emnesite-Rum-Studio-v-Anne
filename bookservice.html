        <div class="snake-wrapper">

            <div class="snake-track">

                <!-- SVG nr 1 -->
                <svg viewBox="0 0 2400 400" class="snake-svg">

                    <path id="snakePath1" d="M0 260 
                       C250 420 350 40 550 200 
                       S850 360 1050 120 
                       S1350 40 1550 240
                       S1850 380 2050 140
                       S2250 60 2400 260" fill="transparent" />

                    <text class="snake-text">
                        <textPath href="#snakePath1">
                            Book rådgivning her — Book rådgivning her — Book rådgivning her —

        <form class="udfyldbokse" action="https://formspree.io/f/xdawdkoy" method="POST">

            <p class="h3udfylder">For at booke en rådgivning skal du udfylde nedenstående punkter: </p>
            <br>
            <br>
            <label>Fulde navn</label>
            <br>
            <input class="navnkasse" type="text" name="name">
            <br>
            <br>
            <label>Adresse, postnummer og by</label>
            <br>

            <input class="navnkasse" type="text" name="address">
            <br>
            <br>
            <label>Mobilnummer</label>
            <br>
            <input class="navnkasse" type="tel" name="phone">
            <br>
            <br>
            <label>Mailadresse</label>
            <br>
            <input class="navnkasse" type="email" name="email">
            <br>
            <br>
            <br>
            <label>
                Sæt kryds i den pakke du er interesseret i:
            </label>
            <br>
            <br>
            <label>
                <input type="radio" name="pakke" value="lille"> Lille pakke
            </label>
            <br>
            <br>
            <label>
                <input type="radio" name="pakke" value="mellem"> Mellem pakke
            </label>
            <br>
            <br>
            <label>
                <input type="radio" name="pakke" value="stor"> Stor pakke
            </label>
            <br>
            <br>
            <br>
            <label class="beskrivprojekt">Beskriv kort dit projekt eller det emne du gerne vil vende med os,
                så vi har mulighed <br>for at forberede os bedst muligt til mødet:</label>
            <br>
            <br>
            <textarea class="navnkasse" name="message" rows="20"></textarea>
            <br>


            <button class="sendlogo" type="submit">
                <img src="img/logoer/sendbookknap.webp" alt="Send">
            </button>

        </form>
